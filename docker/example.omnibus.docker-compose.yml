version: '3.5'

services:
  scrutiny:
    restart: unless-stopped
    container_name: scrutiny
    image: ghcr.io/analogj/scrutiny:master-omnibus
    cap_add:
      - SYS_RAWIO
    ports:
      - "8080:8080" # webapp
      # InfluxDB admin API is only used internally by scrutiny. Do not publish it to all
      # interfaces; bind to localhost only (or comment out entirely if not needed).
      - "127.0.0.1:8086:8086" # influxDB admin (localhost only)
    volumes:
      - /run/udev:/run/udev:ro
      - ./config:/opt/scrutiny/config
      - ./influxdb:/opt/scrutiny/influxdb
    devices:
      - "/dev/sda"
      - "/dev/sdb"
